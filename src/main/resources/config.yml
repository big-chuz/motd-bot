discord:
  token: "PUT_YOUR_BOT_TOKEN_HERE"
  channel-id: "0"
  initial-fetch-limit: 200

motd:
  max-length: 90
  fallback: "&aA Minecraft Server"
  quote-color: "&f"            # used only when random-color is false
  attribution-color: "&7"
  bold: true                   # bold the quote text
  random-color: true           # pick a random color from `palette` each ping
  rainbow-chance: 0.15         # 0.0–1.0; fraction of pings that go full rainbow
  palette: "c6eab9d5"          # legacy color code chars used by random + rainbow
                               # (red gold yellow green aqua blue lightpurple darkpurple)

filtering:
  ignore-bots: true
  ignore-attachments-only: true
  ignore-image-only: true        # skip messages whose only content is an image (no quoted text)
  require-quote-marks: true      # only cache messages that contain a "quoted" string
  min-length: 2

# Map Discord display names (case-insensitive) to friendly aliases used in the
# attribution line. Anything not listed falls back to the raw Discord name.
aliases:
  "we do not fw Y": "Harri"
  # "bolb": "Bolb"
  # "plungie": "Plungie"
