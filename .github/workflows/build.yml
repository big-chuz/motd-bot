name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [created]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to upload release assets

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build (test + shadowJar)
        run: ./gradlew --no-daemon check shadowJar

      - name: Find built jar
        id: jar
        run: |
          jar=$(ls build/libs/motd-bot-*.jar | head -1)
          echo "path=$jar" >> "$GITHUB_OUTPUT"
          echo "name=$(basename $jar)" >> "$GITHUB_OUTPUT"

      - name: Upload jar as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: motd-bot-jar
          path: ${{ steps.jar.outputs.path }}
          retention-days: 30

      - name: Attach jar to GitHub Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.jar.outputs.path }}
