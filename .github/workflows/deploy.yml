name: deploy

# Triggers only on a published Release. The build workflow attaches the jar
# to the release; this workflow downloads that jar onto a self-hosted runner
# living inside CT 104 and swaps it into /opt/minecraft/plugins/.

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to deploy (e.g. v0.2.0). Leave blank to use the latest release."
        required: false
        default: ""

jobs:
  deploy:
    runs-on: [self-hosted, motd-bot-deploy]
    concurrency:
      group: minecraft-deploy
      cancel-in-progress: false

    env:
      PLUGIN_DIR: /opt/minecraft/plugins
      VERSIONS_DIR: /opt/minecraft/plugins/.versions    # versioned jars live here, hidden from Paper's plugin scan
      LIVE_LINK: /opt/minecraft/plugins/motd-bot-current.jar    # the only motd-bot file Paper sees; symlink into .versions/
      STAGING_DIR: /opt/minecraft/plugins/.staging
      SERVICE: minecraft.service

    steps:
      - name: Resolve release tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for build to attach jar to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          set -euo pipefail
          # Releases publish + build-attach-jar happen in two separate workflows
          # that fire from the same UI click. Poll for up to 5 minutes for the
          # build workflow to finish uploading the jar.
          if [ "$TAG" = "latest" ]; then
            api_path="releases/latest"
          else
            api_path="releases/tags/$TAG"
          fi
          found=""
          for i in $(seq 1 30); do
            url=$(curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
              "https://api.github.com/repos/${{ github.repository }}/$api_path" \
              | jq -r '.assets[]? | select(.name | test("^motd-bot-.*\\.jar$")) | .browser_download_url' \
              | head -1)
            if [ -n "$url" ] && [ "$url" != "null" ]; then
              found="$url"
              echo "Found jar after ${i} attempt(s): $found"
              break
            fi
            echo "Waiting for build to upload jar… ($i/30)"
            sleep 10
          done
          if [ -z "$found" ]; then
            echo "::error::Build never attached a motd-bot jar to release $TAG within 5 minutes"
            exit 1
          fi
          # Only NOW export to GITHUB_ENV (visible to subsequent steps).
          echo "ASSET_URL=$found" >> "$GITHUB_ENV"

      - name: Download jar
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          mkdir -p "$STAGING_DIR"
          cd "$STAGING_DIR"
          rm -f motd-bot-*.jar
          curl -fsSL -H "Authorization: Bearer $GH_TOKEN" -o motd-bot-new.jar "$ASSET_URL"
          jar_name=$(basename "$ASSET_URL")
          mv motd-bot-new.jar "$jar_name"
          echo "JAR_NAME=$jar_name" >> "$GITHUB_ENV"
          ls -lh "$jar_name"

      - name: Capture current symlink target (for rollback)
        id: prev
        run: |
          if [ -L "$LIVE_LINK" ]; then
            prev=$(readlink "$LIVE_LINK")
            echo "prev=$prev" >> "$GITHUB_OUTPUT"
          else
            echo "prev=" >> "$GITHUB_OUTPUT"
          fi

      - name: Install jar + atomic symlink swap
        run: |
          set -euo pipefail
          # Install the versioned jar into .versions/ (hidden from Paper's
          # top-level plugin scan), then atomically point the visible
          # motd-bot-current.jar symlink at the new version. Paper sees one
          # plugin file, follows the symlink, loads it once.
          sudo /usr/bin/install -m 644 -o minecraft -g minecraft \
            "$STAGING_DIR/$JAR_NAME" "$VERSIONS_DIR/$JAR_NAME"
          sudo /bin/ln -sfn ".versions/$JAR_NAME" "$LIVE_LINK"
          ls -lh "$LIVE_LINK" "$VERSIONS_DIR/$JAR_NAME"

      - name: Restart minecraft + watch for errors
        id: restart
        run: |
          set -euo pipefail
          sudo /bin/systemctl restart "$SERVICE"
          # Wait for boot to complete (or fail) within 90s
          deadline=$((SECONDS + 90))
          ok=0
          while [ $SECONDS -lt $deadline ]; do
            if sudo /bin/journalctl -u "$SERVICE" --since "2 min ago" --no-pager | grep -qE 'Done \([0-9.]+s\)'; then
              ok=1
              break
            fi
            if sudo /bin/journalctl -u "$SERVICE" --since "2 min ago" --no-pager | grep -qiE 'ExceptionInInitializerError|Could not load|Error occurred while enabling MotdBot'; then
              break
            fi
            sleep 3
          done
          if [ $ok -eq 1 ]; then
            echo "ok=1" >> "$GITHUB_OUTPUT"
          else
            echo "ok=0" >> "$GITHUB_OUTPUT"
            echo "::error::Server didn't reach 'Done' within 90s OR a fatal error appeared"
            sudo /bin/journalctl -u "$SERVICE" --since "2 min ago" --no-pager | tail -50
            exit 1
          fi

      - name: Rollback on failure
        if: failure() && steps.prev.outputs.prev != ''
        run: |
          set -euo pipefail
          echo "Rolling back to ${{ steps.prev.outputs.prev }}"
          sudo /bin/ln -sfn "${{ steps.prev.outputs.prev }}" "$LIVE_LINK"
          sudo /bin/systemctl restart "$SERVICE"

      - name: Cleanup old jars
        if: success()
        run: |
          # Keep the live version + immediately previous (for rollback safety).
          cd "$VERSIONS_DIR"
          ls -1t motd-bot-*.jar 2>/dev/null | tail -n +3 | while read old; do
            sudo /bin/rm "$VERSIONS_DIR/$old"
          done
          echo "--- versions/ ---"
          ls -lh "$VERSIONS_DIR" || true
          echo "--- live ---"
          ls -lh "$LIVE_LINK" || true
